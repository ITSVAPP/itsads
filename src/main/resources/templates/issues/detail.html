<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::body})}">
<head>
<title>課題詳細 | 課題管理アプリケーション</title>
</head>
<body>
	<h1 class="mt-3">課題詳細</h1>
	<a href="./list.html" th:href="@{/issues}">一覧に戻る</a>
	<div th:if="${errmessage}" class="alert alert-danger" role="alert" th:text="${errmessage}">(errmessage)</div>
	<div th:if="${param.changed}" class="alert alert-info" th:text="#{info.changedmessage}">(changedmessge)</div>
	<div th:if="!${errmessage}">
		<div>
			<h2 th:text="${issue.summary}">(summary)</h2>
			<p th:text="${issue.description}">(description)</p>
		</div>
		<div>
			<table class="table w-auto">
				<tbody>
					<tr>
						<th>作成日</th>
						<td th:text="${#dates.format(issue.createdday,'yyyy/MM/dd')}"></td>
					</tr>
					<tr>
						<th>期限</th>
						<td th:text="${#dates.format(issue.deadline,'yyyy/MM/dd')}"></td>
					</tr>
					<tr>
						<th>完了日</th>
						<td th:text="${#dates.format(issue.completionday,'yyyy/MM/dd')}"></td>
					</tr>
					<tr>
						<th>作成者</th>
						<td th:text="${issue.getCreateuserView()}"></td>
					</tr>
					<tr>
						<th>ステータス</th>
						<td th:text="${issue.getStatusView()}"></td>
					</tr>

				</tbody>
			</table>
			<div>
				<a href="/issues/changeForm.html" th:href="@{/issues/{issueId}/change(issueId=${issueId})}" class="btn btn-primary">変更</a>

				<form action="#" th:action="@{/issues/{issueId}/delete(issueId=${issueId})}" th:method="post" class="d-inline" id="form-delete">
					<button type="button" class="btn btn-danger"  data-bs-toggle="modal" data-bs-target="#staticBackdrop">削除</button>
				</form>
			</div>
		</div>
	</div>

	<!-- Modal -->
	<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="staticBackdropLabel">確認ダイアログ</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">削除しますか？</div>
				
				<div class="modal-footer">
					<button type="button" class="btn btn-danger" id="btn-delete">削除</button>
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
				</div>
			</div>
		</div>
	</div>


	<script th:src="@{/main.js}"></script>
</body>
</html>
