<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::body})}">
<head>
    <title>課題作成 | 課題管理アプリケーション</title>
</head>
<body>
<h1 class="mt-3">課題作成</h1>
<form action="#" th:action="@{/issues}" th:method="post" th:object="${issueForm}">
    <div class="mt-3">
        <label for="summaryInput" class="form-label">概要</label>
        <input type="text" id="summaryInput" th:field="*{summary}" class="form-control"
               th:errorclass="is-invalid">
        <p class="invalid-feedback"  th:errors="*{summary}">(error)</p>
    </div>
    <div class="mt-3">
        <label for="descriptionInput" class="form-label">説明</label>
        <textarea id="descriptionInput" row="10" th:field="*{description}" class="form-control"
                  th:errorclass="is-invalid"></textarea>
        <p class="invalid-feedback"  th:errors="*{description}">(error)</p>
    </div>
     <div class="mt-3">
        <label for="deadlineInput" class="form-label">期限</label>
        <input type="date" id="deadlineInput" th:field="*{deadline}" class="form-control"
                  th:errorclass="is-invalid">
        <p class="invalid-feedback"  th:errors="*{deadline}">(error)</p>
    </div>
    
    <div class="mt-3">
        <label for="createuserInput" class="form-label">作成者</label>
        <input type="text" id="createuserInput" th:field="*{createuser}" class="form-control"
                  th:errorclass="is-invalid">
        <p class="invalid-feedback"  th:errors="*{createuser}">(error)</p>
    </div>
    
    <div class="mt-3">
        <label for="statusInput" class="form-label">ステータス</label>
        <select id="statusInput" th:field="*{status}" class="form-control"
                  th:errorclass="is-invalid">
                  <option value="0">未着手</option>
                  <option value="1">着手</option>
                  <option value="2">完了</option>
        </select>
        <p class="invalid-feedback"  th:errors="*{createuser}">(error)</p>
    </div>
    
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">作成</button>
        <a href="./list.html" th:href="@{/issues}" class="btn btn-secondary">キャンセル</a>
    </div>
</form>
</body>
</html>
